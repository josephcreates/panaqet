<!-- Floating Chat Button -->
<button class="chat-btn" onclick="toggleChat()">
    <i class="fas fa-comments"></i>
</button>

<!-- Chat Widget -->
<div class="chat-container" id="chat-container">
    <div class="chat-header" onclick="toggleChat()">
        <strong id="chat-header-title">Chat with {% if conversation %}{{ conversation.seller.username if current_user.is_authenticated and not current_user.is_seller else conversation.buyer.username }}{% else %}Seller{% endif %}</strong> 
        <span class="close-btn">✖</span>
    </div>
    <div id="chat-box"></div>
    <div class="chat-footer">
        <input type="text" id="msg" placeholder="Type a message...">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- FontAwesome for Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
    function toggleChat() {
        var chatContainer = document.getElementById("chat-container");
        chatContainer.classList.toggle("open");
    }

    var socket = new WebSocket("ws://localhost:8080/ws");
    var conversationId = sessionStorage.getItem("conversation_id") || "{{ conversation.id if conversation else '' }}";
    var senderId = "{{ current_user.id if current_user.is_authenticated else '' }}";
    var senderRole = "{{ 'buyer' if current_user.is_authenticated and not current_user.is_seller else 'seller' }}";

    // Get correct chat title
    var otherUserName = "{% if conversation %}{{ conversation.seller.username if senderRole == 'buyer' else conversation.buyer.username }}{% else %}Seller{% endif %}";
    document.getElementById("chat-header-title").innerText = `Chat with ${otherUserName}`;

    socket.onmessage = function(event) {
        var msg = JSON.parse(event.data);
        var chatBox = document.getElementById("chat-box");

        var messageDiv = document.createElement("div");
        messageDiv.classList.add("message");

        if (msg.sender_id == senderId) {
            messageDiv.classList.add("own-message");
        } else {
            messageDiv.classList.add("other-message");
        }

        messageDiv.innerHTML = `<strong>${msg.sender_name}:</strong> ${msg.content}`;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    function sendMessage() {
        var msgContent = document.getElementById("msg").value;
        if (msgContent.trim() === "" || !conversationId) return;

        var messageData = {
            conversation_id: conversationId,
            sender_id: senderId,
            sender_role: senderRole,
            sender_name: "{{ current_user.username }}",
            content: msgContent
        };

        socket.send(JSON.stringify(messageData));
        document.getElementById("msg").value = "";
    }
</script>

<style>
    /* Floating Chat Button */
    .chat-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #28a745;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 50%;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease-in-out;
    }

    .chat-btn:hover {
        transform: scale(1.1);
    }

    /* Chat Widget */
    .chat-container {
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 350px;
        max-height: 450px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 15px;
        display: none;
        flex-direction: column;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
    }

    .chat-container.open {
        display: flex;
        transform: translateY(0);
        opacity: 1;
    }

    .chat-header {
        background: #28a745;
        color: white;
        padding: 12px;
        text-align: center;
        font-weight: bold;
        cursor: pointer;
        border-radius: 15px 15px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .close-btn {
        font-size: 18px;
        cursor: pointer;
    }

    #chat-box {
        flex-grow: 1;
        overflow-y: auto;
        padding: 10px;
        height: 300px;
        background: #f9f9f9;
    }

    .message {
        padding: 8px;
        margin: 5px 0;
        border-radius: 8px;
        font-size: 14px;
    }

    .own-message {
        background-color: #d1ffd6;
        text-align: right;
        border-radius: 10px 10px 0 10px;
        padding: 8px;
    }

    .other-message {
        background-color: #d6e5ff;
        text-align: left;
        border-radius: 10px 10px 10px 0;
        padding: 8px;
    }

    .chat-footer {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
        background: #fff;
        align-items: center;
        border-radius: 0 0 15px 15px;
    }

    .chat-footer input {
        flex-grow: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-size: 14px;
        outline: none;
    }

    .chat-footer button {
        margin-left: 8px;
        padding: 10px;
        background-color: #28a745;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 50%;
        font-size: 16px;
        transition: background 0.2s;
    }

    .chat-footer button:hover {
        background: #218838;
    }
</style>
