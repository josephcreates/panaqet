<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <!-- Bootstrap 5.3.0 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body {
            background-color: #f7f7f7;
            font-family: Arial, sans-serif;
        }

        .container {
            margin-top: 20px;
        }

        .product-img-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            padding: 10px;
            background-color: #fff;
        }

        .product-details {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
        }

        .price {
            font-size: 1.5rem;
            color: #b12704;
            font-weight: bold;
        }

        .btn-primary, .btn-warning {
            width: 100%;
            margin-bottom: 10px;
        }

        .ratings {
            color: #ff9900;
            font-size: 1rem;
        }

        .reviews {
            font-size: 0.9rem;
            color: #007185;
            cursor: pointer;
        }

        .product-description {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        .seller-link {
            color: #007185;
            text-decoration: none;
        }

        .seller-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <!-- Product Image Section -->
            <div class="col-md-5">
                <div class="product-img-container">
                    <img src="{{ url_for('static', filename='product_image.jpg') }}" alt="Product Image" class="img-fluid">
                </div>
            </div>

            <!-- Product Details Section -->
            <div class="col-md-7">
                <div class="product-details">
                    <h2>{{ product.name }}</h2>
                    <p class="price">$ {{ product.price }}</p>
                    <p class="ratings">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="far fa-star"></i>
                        <span class="reviews">(123 reviews)</span>
                    </p>
                    <p><strong>Available:</strong> In Stock</p>
                    <p><strong>Sold by:</strong>
                        <a href="{{ url_for('seller_routes.store', seller_id=product.seller_id) }}" class="seller-link">
                            {{ product.seller.store_name }}
                        </a>
                    </p>
                    <button class="btn btn-warning btn-lg"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                    <button class="btn btn-primary btn-lg"><i class="fas fa-bolt"></i> Buy Now</button>
                    <p class="mt-3"><strong>Delivery:</strong> Free shipping on orders over $25</p>
                </div>
            </div>
        </div>

        <!-- Product Description Section -->
        <div class="row mt-4">
            <div class="col">
                <div class="product-description">
                    <h4>Product Description</h4>
                    <p>{{ product.description }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3.0 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
