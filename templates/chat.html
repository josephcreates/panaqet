<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
        }

        .chat-container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        #chat-box {
            height: 400px;
            overflow-y: auto;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .message {
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            max-width: 80%;
        }

        .own-message {
            background-color: #d1ffd6;
            text-align: right;
            align-self: flex-end;
            border-radius: 10px 10px 0 10px;
            padding: 8px;
        }

        .other-message {
            background-color: #d6e5ff;
            text-align: left;
            align-self: flex-start;
            border-radius: 10px 10px 10px 0;
            padding: 8px;
        }

        .chat-header {
            font-weight: bold;
            text-align: center;
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <h2 class="chat-header">
            Chat with 
            {% if conversation %}
                {% if current_user.id == conversation.buyer.id %}
                    {{ conversation.seller.username }}
                {% else %}
                    {{ conversation.buyer.username }}
                {% endif %}
            {% else %}
                Unknown User
            {% endif %}
        </h2>
        
        <div id="chat-box"></div>
        <div class="input-group mt-3">
            <input type="text" id="msg" class="form-control" placeholder="Type a message...">
            <button class="btn btn-success" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        var socket = new WebSocket("ws://localhost:8080/ws");
        var conversationId = "{{ conversation.id if conversation else '' }}";
        var senderId = "{{ current_user.id if current_user.is_authenticated else '' }}";
        var senderRole = "{{ 'buyer' if current_user.is_authenticated and not current_user.is_seller else 'seller' }}";
        var chatBox = document.getElementById("chat-box");

        // ✅ WebSocket Event Logging for Debugging
        socket.onopen = function() { console.log("✅ WebSocket connected."); };
        socket.onerror = function(error) { console.error("❌ WebSocket error:", error); };
        socket.onclose = function() { console.log("🔴 WebSocket closed."); };

        // ✅ Handle Incoming Messages
        socket.onmessage = function(event) {
            var msg = JSON.parse(event.data);
            console.log("📩 Received:", msg);

            var messageDiv = document.createElement("div");
            messageDiv.classList.add("message");

            if (msg.sender_id == senderId) {
                messageDiv.classList.add("own-message");
            } else {
                messageDiv.classList.add("other-message");
            }

            messageDiv.innerHTML = `<strong>${msg.sender_name}:</strong> ${msg.content}`;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        // ✅ Send Message
        function sendMessage() {
    var msgContent = document.getElementById("msg").value;
    if (msgContent.trim() === "" || !conversationId) {
        console.warn("⚠️ Message not sent: Empty content or missing conversation ID.");
        return;
    }

    var messageData = {
        conversation_id: String(conversationId),  // ✅ Convert to string
        sender_id: String(senderId),  // ✅ Convert to string
        sender_role: senderRole,
        content: msgContent
    };

    console.log("🔹 Sending message:", messageData);

    if (socket.readyState !== 1) {
        console.error("❌ WebSocket is not connected. ReadyState:", socket.readyState);
        return;
    }

    socket.send(JSON.stringify(messageData)); // Send via WebSocket
    document.getElementById("msg").value = ""; // Clear input field
}

        // ✅ Load Previous Messages from Flask API
        function loadPastMessages() {
            fetch(`/chat/get_messages/${conversationId}`)
            .then(response => response.json())
            .then(messages => {
                chatBox.innerHTML = ""; // Clear chat box before loading messages
                messages.forEach(msg => {
                    var messageDiv = document.createElement("div");
                    messageDiv.classList.add("message");

                    if (msg.sender_id == senderId) {
                        messageDiv.classList.add("own-message");
                    } else {
                        messageDiv.classList.add("other-message");
                    }

                    messageDiv.innerHTML = `<strong>${msg.sender_name}:</strong> ${msg.content}`;
                    chatBox.appendChild(messageDiv);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(error => console.error("❌ Error loading messages:", error));
        }

        // ✅ Load messages on page load
        loadPastMessages();
    </script>
    <script>
        console.log("🔹 Conversation ID:", "{{ conversation.id if conversation else 'None' }}");
    </script>    

</body>
</html>
