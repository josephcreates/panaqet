<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Feedback</title>
</head>
<body>
    <header>
        <h1 class="text-center bg-primary text-white py-3">Feedback</h1>
    </header>
    <main class="container mt-5">
        <h2 class="text-center">We Value Your Feedback</h2>
        <p class="text-center">Please let us know how we can improve your experience.</p>
        <form action="{{ url_for('routes.feedback') }}" method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Name (optional)</label>
                <input type="text" class="form-control" id="name" name="name" placeholder="Your Name">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email (optional)</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Your Email">
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Feedback</label>
                <textarea class="form-control" id="message" name="message" rows="5" placeholder="Write your feedback here..." required></textarea>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Submit Feedback</button>
            </div>
        </form>        
    </main>
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2024 PanaQet. All Rights Reserved.</p>
    </footer>
</body>
</html>
